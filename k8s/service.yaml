apiVersion: v1
kind: Service
metadata:
  name: invoice-platform-service
  namespace: default
spec:
  selector:
    app: invoice-platform
  type: NodePort
  sessionAffinity: ClientIP        # Sticky sessions — same client always hits same pod
  sessionAffinityConfig:           # Required because app uses in-memory sessions
    clientIP:
      timeoutSeconds: 3600
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
    nodePort: 30090                # Access via http://<Worker-IP>:30090/login
