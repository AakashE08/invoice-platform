<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Access Denied</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Inter',sans-serif; background:#fef2f2; display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .box { text-align:center; padding:2rem; }
        h1 { font-size:3rem; margin:0; color:#991b1b; }
        p  { color:#7f1d1d; margin:0.5rem 0 1.5rem; }
        a  { display:inline-block; padding:0.6rem 1.5rem; background:#0a0a0a; color:#fff; border-radius:0.375rem; text-decoration:none; font-size:0.875rem; font-weight:500; }
    </style>
</head>
<body>
    <div class="box">
        <h1>403</h1>
        <p>You don't have permission to access this page.</p>
        <a href="/login">Back to Login</a>
    </div>
</body>
</html>
